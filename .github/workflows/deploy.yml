name: Deploy Tax4Sure

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ── 1. Provision / update infrastructure ────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      lambda_function_url: ${{ steps.tf-output.outputs.lambda_function_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: terraform

      - name: Export Terraform outputs
        id: tf-output
        run: |
          echo "lambda_function_url=$(terraform output -raw lambda_function_url)" >> "$GITHUB_OUTPUT"
        working-directory: terraform

  # ── 2. Build & deploy Lambda API ────────────────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda API
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Install Lambda dependencies
        run: npm ci
        working-directory: lambda

      - name: Compile TypeScript
        run: npx tsc --project tsconfig.json
        working-directory: lambda

      - name: Package Lambda ZIP
        run: |
          cp -r node_modules dist/
          cd dist && zip -r ../lambda.zip .
        working-directory: lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload ZIP to S3
        run: aws s3 cp lambda/lambda.zip s3://tax4surelambdaartifacts/api/lambda.zip

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name tax4sure-api \
            --s3-bucket tax4surelambdaartifacts \
            --s3-key api/lambda.zip

  # ── 3. Build & deploy static website ────────────────────────────────────────
  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.terraform.outputs.lambda_function_url }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (assets with long cache)
        run: |
          aws s3 sync out/ s3://tax4sure \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

      - name: Sync to S3 (HTML with no cache)
        run: |
          aws s3 sync out/ s3://tax4sure \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --exclude "*"
