<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0D1F4E"/>
  <defs>
    <linearGradient id="sh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A6EC4"/>
      <stop offset="100%" stop-color="#1B3A7A"/>
    </linearGradient>
    <linearGradient id="ar" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B8EC4"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C060"/>
    </linearGradient>
  </defs>

  <!-- Shield outer -->
  <path d="M8 17 L32 10 L56 17 L56 38 C56 52 32 58 32 58 C32 58 8 52 8 38 Z"
        fill="url(#sh)"/>
  <!-- Shield inner border -->
  <path d="M12 19.5 L32 13.5 L52 19.5 L52 38 C52 50 32 55.5 32 55.5 C32 55.5 12 50 12 38 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Chart line -->
  <polyline points="14,45 22,36 28,40 36,28 44,23"
            stroke="url(#ar)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head + shaft -->
  <line x1="44" y1="23" x2="51" y2="14"
        stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="51,14 43,17 46,24" fill="#C9A84C"/>
</svg>
