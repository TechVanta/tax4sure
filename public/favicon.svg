<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">

  <!-- Dark navy rounded background -->
  <rect width="64" height="64" rx="10" fill="#0D1F4E"/>

  <defs>
    <!-- Gold gradient for outer shield — matches the 3D logo -->
    <linearGradient id="goldOuter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E8C060"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <!-- Blue gradient for inner shield -->
    <linearGradient id="blueInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2B5BA8"/>
      <stop offset="100%" stop-color="#0D1F4E"/>
    </linearGradient>
  </defs>

  <!-- Outer gold shield -->
  <path d="M32 5 L55 13 L55 36 Q55 52 32 60 Q9 52 9 36 L9 13 Z"
        fill="url(#goldOuter)"/>

  <!-- Inner blue shield (inset) -->
  <path d="M32 11 L50 18 L50 36 Q50 49 32 56 Q14 49 14 36 L14 18 Z"
        fill="url(#blueInner)"/>

  <!-- "T4" monogram in gold — bold and readable at small sizes -->
  <text x="23" y="42"
        font-family="'Arial Black', 'Inter', sans-serif"
        font-size="19" font-weight="900"
        fill="#C9A84C" letter-spacing="-1">T4</text>

</svg>
